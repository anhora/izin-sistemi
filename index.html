<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurumsal İzin Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <div class="bg-slate-900 p-8 text-white">
            <h2 class="text-2xl font-semibold">İzin Talep Formu</h2>
            <p class="text-slate-400 text-sm mt-1">Lütfen bilgileri eksiksiz doldurunuz.</p>
        </div>
        
        <form id="izinForm" class="p-8 space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Ad Soyad</label>
                <input type="text" id="adSoyad" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-900 focus:outline-none transition" placeholder="Örn: Ahmet Yılmaz">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">İzin Türü</label>
                <select id="tur" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-900 focus:outline-none transition">
                    <option value="Yıllık İzin">🌴 Yıllık İzin</option>
                    <option value="Sağlık İzni">🏥 Sağlık İzni</option>
                    <option value="Mazeret">📝 Mazeret İzni</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Başlangıç</label>
                    <input type="date" id="baslangic" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-900 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Bitiş</label>
                    <input type="date" id="bitis" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-900 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Açıklama</label>
                <textarea id="aciklama" rows="3" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-900 outline-none" placeholder="İzin gerekçesi..."></textarea>
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white font-semibold py-3 rounded-lg hover:bg-slate-800 transform active:scale-95 transition-all shadow-lg shadow-slate-200">
                Talebi Gönder
            </button>
        </form>
    </div>

    <script>
        document.getElementById('izinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const veri = {
                adSoyad: document.getElementById('adSoyad').value,
                tur: document.getElementById('tur').value,
                baslangic: document.getElementById('baslangic').value,
                bitis: document.getElementById('bitis').value,
                aciklama: document.getElementById('aciklama').value
            };

            const response = await fetch('https://izin-sistemi-kho6.onrender.com/izin-talep', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(veri)
            });

            if (response.ok) {
                alert("Talebiniz başarıyla iletildi.");
                e.target.reset();
            }
        });
    </script>
</body>
</html>
