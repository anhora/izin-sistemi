<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli | İzin Takip Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 2px solid #4f46e5; color: #4f46e5; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 text-center md:text-left">İzin Yönetim Merkezi</h1>
                <p class="text-sm text-slate-500 text-center md:text-left">Kurumsal Personel İzin Takip Sistemi</p>
            </div>
            <div class="flex gap-4 w-full md:w-auto justify-center">
                <div class="bg-white px-6 py-2 rounded-xl border border-slate-200 shadow-sm text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Toplam</p>
                    <p id="statToplam" class="text-xl font-bold text-slate-800">0</p>
                </div>
                <div class="bg-white px-6 py-2 rounded-xl border border-indigo-100 shadow-sm text-center">
                    <p class="text-[10px] text-indigo-400 font-bold uppercase">Bekleyen</p>
                    <p id="statBekleyen" class="text-xl font-bold text-indigo-600">0</p>
                </div>
            </div>
        </header>

        <div class="flex border-b border-slate-200 mb-6 bg-white rounded-t-2xl overflow-x-auto shadow-sm">
            <button onclick="izinleriGetir('Hepsi')" id="tabHepsi" class="px-6 py-4 text-sm whitespace-nowrap transition tab-active">Tüm Talepler</button>
            <button onclick="izinleriGetir('Beklemede')" id="tabBeklemede" class="px-6 py-4 text-sm whitespace-nowrap text-slate-500 hover:bg-slate-50 transition">Bekleyenler</button>
            <button onclick="izinleriGetir('Onaylandı')" id="tabOnaylandi" class="px-6 py-4 text-sm whitespace-nowrap text-slate-500 hover:bg-slate-50 transition">Onaylananlar</button>
            <button onclick="izinleriGetir('Reddedildi')" id="tabReddedildi" class="px-6 py-4 text-sm whitespace-nowrap text-slate-500 hover:bg-slate-50 transition">Reddedilenler</button>
        </div>

        <div class="bg-white rounded-b-2xl shadow-sm border border-slate-200 overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[600px]">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Personel</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-center tracking-wider">İzin Türü</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-center tracking-wider">Tarih Aralığı</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-center tracking-wider">Durum</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-right tracking-wider">İşlem</th>
                    </tr>
                </thead>
                <tbody id="tabloGövde" class="divide-y divide-slate-100">
                    </tbody>
            </table>
            <div id="bosMesaj" class="hidden p-16 text-center">
                <p class="text-slate-400 italic text-sm">Gösterilecek herhangi bir kayıt bulunamadı.</p>
            </div>
        </div>
    </div>

    <script>
        let mevcutFiltre = 'Hepsi';
        const API_URL = 'https://izin-sistemi-kho6.onrender.com';

        async function izinleriGetir(filtre = 'Hepsi') {
            mevcutFiltre = filtre;
            
            // Sekme Tasarımını Güncelle
            const sekmeler = ['Hepsi', 'Beklemede', 'Onaylandı', 'Reddedildi'];
            sekmeler.forEach(s => {
                const tab = document.getElementById('tab' + s);
                if(tab) {
                    tab.className = `px-6 py-4 text-sm whitespace-nowrap transition ${mevcutFiltre === s ? 'tab-active text-indigo-600' : 'text-slate-500 hover:bg-slate-50'}`;
                }
            });

            try {
                const response = await fetch(`${API_URL}/izinler`);
                const izinler = await response.json();

                // İstatistikleri Güncelle
                document.getElementById('statToplam').innerText = izinler.length;
                document.getElementById('statBekleyen').innerText = izinler.filter(i => i.durum === 'Beklemede').length;

                const tablo = document.getElementById('tabloGövde');
                const bosMesaj = document.getElementById('bosMesaj');
                tablo.innerHTML = '';

                const filtrelenmis = filtre === 'Hepsi' ? izinler : izinler.filter(i => i.durum === filtre);

                if (filtrelenmis.length === 0) {
                    bosMesaj.classList.remove('hidden');
                } else {
                    bosMesaj.classList.add('hidden');
                    // En yeni en üstte görünsün
                    filtrelenmis.slice().reverse().forEach(izin => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-slate-50 transition-colors";

                        let durumBadge = "";
                        if(izin.durum === "Onaylandı") {
                            durumBadge = '<span class="px-2.5 py-1 bg-green-50 text-green-700 rounded-lg text-[10px] font-bold border border-green-100 tracking-wide">ONAYLANDI</span>';
                        } else if(izin.durum === "Reddedildi") {
                            durumBadge = '<span class="px-2.5 py-1 bg-red-50 text-red-700 rounded-lg text-[10px] font-bold border border-red-100 tracking-wide">REDDEDİLDİ</span>';
                        } else {
                            durumBadge = '<span class="px-2.5 py-1 bg-amber-50 text-amber-700 rounded-lg text-[10px] font-bold border border-amber-100 tracking-wide italic underline">BEKLEMEDE</span>';
                        }

                        tr.innerHTML = `
                            <td class="px-6 py-4">
                                <div class="flex flex-col">
                                    <span class="font-semibold text-slate-800 text-sm">${izin.adSoyad}</span>
                                    <span class="text-[11px] text-slate-400 mt-0.5 truncate max-w-[180px]" title="${izin.aciklama}">${izin.aciklama || 'Açıklama belirtilmedi.'}</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-center text-xs text-slate-600 font-medium">${izin.tur}</td>
                            <td class="px-6 py-4 text-center text-[11px] text-slate-500">${izin.baslangic} <span class="text-slate-300 mx-1">/</span> ${izin.bitis}</td>
                            <td class="px-6 py-4 text-center">${durumBadge}</td>
                            <td class="px-6 py-4 text-right">
                                ${izin.durum === 'Beklemede' ? `
                                    <div class="flex justify-end gap-2">
                                        <button onclick="durumGuncelle(${izin.id}, 'Onaylandı')" class="bg-indigo-600 text-white p-1.5 rounded-lg hover:bg-indigo-700 transition shadow-sm active:scale-90" title="Onayla">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
                                        </button>
                                        <button onclick="durumGuncelle(${izin.id}, 'Reddedildi')" class="bg-white text-red-500 border border-red-200 p-1.5 rounded-lg hover:bg-red-50 transition active:scale-90" title="Reddet">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg>
                                        </button>
                                    </div>
                                ` : '<span class="text-slate-300 text-xs">—</span>'}
                            </td>
                        `;
                        tablo.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error("Veri çekme hatası:", error);
            }
        }

        async function durumGuncelle(id, yeniDurum) {
            try {
                const response = await fetch(`${API_URL}/izin-durum/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ durum: yeniDurum })
                });
                if(response.ok) {
                    izinleriGetir(mevcutFiltre);
                }
            } catch (err) {
                console.error("Güncelleme hatası:", err);
            }
        }

        // Sayfa ilk açıldığında verileri çek
        izinleriGetir();
    </script>
</body>
</html>
