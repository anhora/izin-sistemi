<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönetim Paneli | İzin Takip Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 2px solid #4f46e5; color: #4f46e5; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">İzin Yönetim Merkezi</h1>
                <p class="text-sm text-slate-500">Tüm talepleri tablo üzerinden kontrol edin.</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Toplam Kayıt</p>
                    <p id="statToplam" class="text-xl font-bold text-slate-800">0</p>
                </div>
                <div class="bg-white px-4 py-2 rounded-lg border border-indigo-100 shadow-sm">
                    <p class="text-[10px] text-indigo-400 font-bold uppercase">Bekleyen</p>
                    <p id="statBekleyen" class="text-xl font-bold text-indigo-600">0</p>
                </div>
            </div>
        </header>

        <div class="flex border-bottom border-slate-200 mb-6 bg-white rounded-t-xl overflow-hidden shadow-sm">
            <button onclick="izinleriGetir('Hepsi')" id="tabHepsi" class="px-6 py-3 text-sm text-slate-500 hover:bg-slate-50 transition tab-active">Tüm Talepler</button>
            <button onclick="izinleriGetir('Beklemede')" id="tabBeklemede" class="px-6 py-3 text-sm text-slate-500 hover:bg-slate-50 transition">Bekleyenler</button>
            <button onclick="izinleriGetir('Onaylandı')" id="tabOnaylandi" class="px-6 py-3 text-sm text-slate-500 hover:bg-slate-50 transition">Onaylananlar</button>
            <button onclick="izinleriGetir('Reddedildi')" id="tabReddedildi" class="px-6 py-3 text-sm text-slate-500 hover:bg-slate-50 transition">Reddedilenler</button>
        </div>

        <div class="bg-white rounded-b-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Personel</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-center">Tür</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-center">Tarih Aralığı</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-center">Durum</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-right">İşlem</th>
                    </tr>
                </thead>
                <tbody id="tabloGövde" class="divide-y divide-slate-100">
                    </tbody>
            </table>
            <div id="bosMesaj" class="hidden p-12 text-center text-slate-400 italic">Kayıt bulunamadı.</div>
        </div>
    </div>

    <script>
        let aktifFiltre = 'Hepsi';

        async function izinleriGetir(filtre = 'Hepsi') {
            aktifFiltre = filtre;
            
            // Sekme stilini güncelle
            const sekmeler = ['Hepsi', 'Beklemede', 'Onaylandı', 'Reddedildi'];
            sekmeler.forEach(s => {
                document.getElementById('tab' + s).className = `px-6 py-3 text-sm transition ${aktifFiltre === s ? 'tab-active' : 'text-slate-500 hover:bg-slate-50'}`;
            });

            try {
                const response = await fetch('https://izin-sistemi-kho6.onrender.com/izinler');
                const izinler = await response.json();

                // İstatistik güncelle
                document.getElementById('statToplam').innerText = izinler.length;
                document.getElementById('statBekleyen').innerText = izinler.filter(i => i.durum === 'Beklemede').length;

                const tablo = document.getElementById('tabloGövde');
                const bosMesaj = document.getElementById('bosMesaj');
                tablo.innerHTML = '';

                const filtrelenmis = filtre === 'Hepsi' ? izinler : izinler.filter(i => i.durum === filtre);

                if (filtrelenmis.length === 0) {
                    bosMesaj.classList.remove('hidden');
                } else {
                    bosMesaj.classList.add('hidden');
                    filtrelenmis.reverse().forEach(izin => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-slate-50 transition-colors group";

                        let durumHTML = "";
                        if(izin.durum === "Onaylandı") durumHTML = '<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-[10px] font-bold">ONAYLANDI</span>';
                        else if(izin.durum === "Reddedildi") durumHTML = '<span class="px-2 py-1 bg-red-100 text-red-700 rounded text-[10px] font-bold">REDDEDİLDİ</span>';
                        else durumHTML = '<span class="px-2 py-1 bg-amber-100 text-amber-700 rounded text-[10px] font-bold">BEKLEMEDE</span>';

                        tr.innerHTML = `
                            <td class="px-6 py-4">
                                <p class="font-semibold text-slate-800 text-sm">${izin.adSoyad}</p>
                                <p class="text-[11px] text-slate-400 truncate max-w-[200px]" title="${izin.aciklama}">${izin.aciklama || 'Açıklama yok'}</p>
                            </td>
                            <td class="px-6 py-4 text-center text-xs text-slate-600">${izin.tur}</td>
                            <td class="px-6 py-4 text-center text-xs text-slate-500 font-medium">${izin.baslangic} <span class="text-slate-300">/</span> ${izin.bitis}</td>
                            <td class="px-6 py-4 text-center">${durumHTML}</td>
                            <td class="px-6 py-4 text-right">
                                ${izin.durum === 'Beklemede' ? `
                                    <div class="flex justify-end gap-2">
                                        <button onclick="durumGuncelle(${izin.id}, 'Onaylandı')" class="bg-indigo-600 text-white p-1.5 rounded-md hover:bg-indigo-700 transition shadow-sm"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg></button>
                                        <button onclick="durumGuncelle(${izin.id}, 'Reddedildi')" class="bg-white text-red-500 border border-red-200 p-1.5 rounded-md hover:bg-red-50 transition"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg></button>
                                    </div>
                                ` : '<span class="text-slate-300 text-xs">-</span>'}
                            </td>
                        `;
                        tablo.appendChild(tr);
                    });
                }
            } catch (e) { console.error("Hata:", e); }
        }

        async function durumGuncelle(id, yeniDurum) {
            await fetch(`https://izin-sistemi-kho6.onrender.com/izin-durum/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ durum: yeniDurum })
            });
            izinleriGetir(aktifFiltre);
        }

        izinleriGetir();
    </script>
</body>
</html>
