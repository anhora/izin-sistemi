<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönetici Paneli | İzin Takip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Yönetim Paneli</h1>
                <p class="text-slate-500">Gelen izin taleplerini buradan yönetebilirsiniz.</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                <span class="text-sm font-medium text-slate-600">Aktif İstekler</span>
                <span id="toplamIzin" class="ml-2 bg-indigo-100 text-indigo-700 px-2 py-1 rounded-md text-xs font-bold">0</span>
            </div>
        </header>
        
        <div id="izinListesi" class="grid gap-6">
            </div>
    </div>

    <script>
        async function izinleriGetir() {
            const response = await fetch('https://izin-sistemi-kho6.onrender.com/izinler');
            const izinler = await response.json();
            document.getElementById('toplamIzin').innerText = izinler.length;
            const listeDiv = document.getElementById('izinListesi');
            listeDiv.innerHTML = '';

            izinler.reverse().forEach(izin => { // En yeni en üstte
                const kart = document.createElement('div');
                kart.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition hover:shadow-md";
                
                let durumBadge = "";
                if(izin.durum === "Onaylandı") durumBadge = '<span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">Onaylandı</span>';
                else if(izin.durum === "Reddedildi") durumBadge = '<span class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold">Reddedildi</span>';
                else durumBadge = '<span class="px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-xs font-bold">Beklemede</span>';

                kart.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <h3 class="text-lg font-semibold text-slate-900">${izin.adSoyad}</h3>
                            ${durumBadge}
                        </div>
                        <div class="grid grid-cols-2 gap-x-8 gap-y-1 text-sm text-slate-500">
                            <p><span class="font-medium">Tür:</span> ${izin.tur}</p>
                            <p><span class="font-medium">Tarih:</span> ${izin.baslangic} / ${izin.bitis}</p>
                            <p class="col-span-2 mt-2 italic text-slate-400">"${izin.aciklama || 'Açıklama belirtilmedi.'}"</p>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        ${izin.durum === 'Beklemede' ? `
                            <button onclick="durumGuncelle(${izin.id}, 'Onaylandı')" class="flex-1 md:flex-none bg-green-600 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-green-700 transition">Onayla</button>
                            <button onclick="durumGuncelle(${izin.id}, 'Reddedildi')" class="flex-1 md:flex-none bg-white text-red-600 border border-red-200 px-5 py-2 rounded-lg text-sm font-semibold hover:bg-red-50 transition">Reddet</button>
                        ` : ''}
                    </div>
                `;
                listeDiv.appendChild(kart);
            });
        }

        async function durumGuncelle(id, yeniDurum) {
            await fetch(`https://izin-sistemi-kho6.onrender.com/izin-durum/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ durum: yeniDurum })
            });
            izinleriGetir();
        }
        izinleriGetir();
    </script>
</body>
</html>
